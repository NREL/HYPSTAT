#Model condition 
studiedyear  :   2050 # Units: yr
firstYear         : 2030  # Units: yr
lastYear          : 2050  # Units: yr
timeWindow        : 10  # Units: yr
senario           : 'Best_Guess'  # Scenario for the run

#Import
max_imports_ratio : 0.25 # 25% of the total hydrogen system demand
import_zones  : ['F'] #zones which can import hydrogen

#Model constrain:
truck_size_limit  : 4166 #kg/hr, 100 trucks/day * 1000kg/truck /24 hr/day
hydrogen_overserved_cost  : 5 #$/kg

Cost_of_Unserved_H2 : 1000 #$/kg
Storage_charge_cost :  0.06 #$/kg
bigM : 300000 #kg/period, upper bound on pipeline capacity (~7000 TPD)
pipeline_cost_alpha : 18.86
pipeline_cost_beta : 2122612



#Time controls (use for intrayear analysis)
start : '1 Jan ' #start date for intrayear analysis 
end : '7 Jan ' # end date for intrayear analysis

#Financial parameter (recovery factor)
interest  : 0.10
payback_years : 30
payback_years_tank  : 30
payback_years_electrolyzer  : 40

#Networks and zones
all_zones : ['A','BN', 'BS', 'CN', 'CS', 'E','EN','F','GE','GW','HI','J','K']

#FilePath:
demandFile:
  - "Inputs/demand/h2_demand.tsv"

REcostFile:
  - "Inputs/technology_financials/renewable-build-cost.csv"

ProductioncostFile:
  - "Inputs/technology_financials/hydrogen-production-cost.csv"

H2DeliveryFile:
  - "Inputs/technology_financials/hydrogen-delivery-cost.csv"

H2StorageFile:
  - "Inputs/technology_financials/hydrogen-storage-cost.csv"

SupplycurveFolder:
  - "Inputs/supply_curves"

NetworksFiles:
  - "Inputs/networks/unlimited_links.csv"

IncentiveFiles:
  - "Inputs/policy/renewable-incentives.csv"

StorageCapacityFiles:
  - "Inputs/storage/storage_capacities.csv"

StorageLimitsFiles:
  - "Inputs/storage/storage_constrain.csv"
